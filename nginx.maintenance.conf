server {
    listen 80;
    server_name localhost caicai.caicaitask.click ing.caicaitask.click;

    # ⭐ 所有请求都指向维护页面
    location / {
        root /opt/caicai-planet/maintenance;
        index index.html;
        try_files $uri $uri/ =503;
    }

    # API 直接返回 503，不转发到后端（避免 502 错误页）
    location /api/ {
        return 503;
    }

    # 确保错误码也显示维护页
    error_page 502 503 504 /index.html;
}
